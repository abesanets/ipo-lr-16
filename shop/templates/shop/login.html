{% extends 'shop/base.html' %}

{% block title %}Вход — Магазин электроники{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>Вход</h1>

    {% if form.errors %}
        <div class="messages">
            <div class="message error">Неверное имя пользователя или пароль.</div>
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Имя пользователя</label>
            <input type="text" name="username" id="id_username" required autofocus>
        </div>
        <div class="form-group">
            <label for="id_password">Пароль</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        <button type="submit" class="btn btn-blue">Войти</button>
    </form>

    <div class="links">
        <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
    </div>
</div>
{% endblock %}
