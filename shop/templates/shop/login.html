{% extends 'shop/base.html' %}

{% block title %}Вход — Shopex{% endblock %}

{% block content %}
<div class="auth-wrap">
    <h1>Вход</h1>
    <p style="color: var(--text-secondary); margin-bottom: 32px;">Войдите, чтобы делать покупки и отслеживать заказы.</p>

    {% if form.errors %}
        <div class="messages">
            <div class="message error">Неверное имя пользователя или пароль.</div>
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Имя пользователя</label>
            <input type="text" name="username" id="id_username" required autofocus>
        </div>
        <div class="form-group">
            <label for="id_password">Пароль</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;">Войти</button>
    </form>

    <div class="auth-links">
        <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
    </div>
</div>
{% endblock %}
